<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Urbor • Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f6faf9; 
      color: #1a2e2b;
    }
    .card {
      background: white;
      border-radius: 24px;
      border: 1px solid #e2f0e8;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    }
    .product-item {
      background: white;
      border-radius: 20px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 2px solid #e2f0e8;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .product-item:hover {
      border-color: #0f8f6e;
      transform: translateY(-2px);
    }
    .product-item.in-cart {
      border-color: #0f8f6e;
      background: #ebfaf3;
    }
    .product-item.in-cart .check-indicator {
      background: #0f8f6e;
      border-color: #0f8f6e;
      color: white;
    }
    .check-indicator {
      width: 24px; height: 24px;
      border-radius: 24px;
      border: 2px solid #cbdcd0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .input-field {
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: white;
      border: 1px solid #d0e2da;
      border-radius: 20px;
      transition: all 0.2s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: #0f8f6e;
      box-shadow: 0 0 0 3px rgba(15,143,110,0.1);
    }
    .input-field.error {
      border-color: #dc4a4a;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .premium-btn {
      background: #0f8f6e;
      color: white;
      font-weight: 600;
      padding: 1rem;
      border-radius: 40px;
      width: 100%;
      box-shadow: 0 8px 16px rgba(15,143,110,0.2);
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .premium-btn:hover { 
      background: #0c7559;
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15,143,110,0.3);
    }
    .premium-btn:active { transform: translateY(0); }
    .premium-btn:disabled { 
      opacity: 0.5; 
      cursor: not-allowed;
      transform: none;
    }
    .message {
      padding: 1rem;
      border-radius: 40px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.success { background: #e0f5e8; color: #0b5e45; }
    .message.error { background: #fee9e7; color: #aa2e2e; }
    .summary-line { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed #cfe3db; }
    .summary-total { font-size: 1.8rem; font-weight: 700; color: #0f8f6e; }
    
    /* Quantity button styles */
    .qty-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: white;
      border: 2px solid #0f8f6e;
      color: #0f8f6e;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 0.7rem;
      flex-shrink: 0;
    }
    .qty-btn:hover:not(:disabled) {
      background: #0f8f6e;
      color: white;
      transform: scale(1.05);
    }
    .qty-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .qty-display {
      min-width: 1.8rem;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      color: #1a2e2b;
    }
    
    /* Cart item styles */
    .cart-item {
      background: #f8faf9;
      border-radius: 16px;
      padding: 0.85rem;
      margin-bottom: 0.75rem;
      border: 1px solid #e2f0e8;
      transition: all 0.2s ease;
    }
    .cart-item:hover {
      border-color: #0f8f6e;
      background: #ebfaf3;
    }
    .cart-item-name {
      font-weight: 500;
      color: #1a2e2b;
      margin-bottom: 0.25rem;
    }
    .cart-item-price {
      color: #0f8f6e;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .remove-btn {
      color: #aa2e2e;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 50%;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .remove-btn:hover {
      background: #fee9e7;
      transform: scale(1.1);
    }
    
    /* Empty cart state */
    .empty-cart {
      text-align: center;
      padding: 1.5rem;
      color: #6b8a7a;
    }
    .empty-cart i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      opacity: 0.6;
    }
    
    /* Delivery badge */
    .delivery-badge {
      background: linear-gradient(135deg, #0f8f6e, #14b87e);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
  </style>
</head>
<body class="antialiased">

<div class="max-w-6xl mx-auto px-4 py-6">
  
  <div class="text-center mb-8">
    <h1 class="text-4xl font-light">complete <span class="font-semibold text-green-700">order</span></h1>
  </div>

  <div class="grid md:grid-cols-12 gap-6">
    
    <!-- Products Selection Panel -->
    <div class="md:col-span-5 space-y-5">
      <div class="card p-5">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2">
            <i class="fas fa-tag text-green-600"></i>
            <span class="font-semibold">select products</span>
          </div>
          <span id="cart-count" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full font-medium">0 items</span>
        </div>
        <div class="space-y-2 max-h-80 overflow-y-auto pr-1" id="product-list"></div>
      </div>
    </div>

    <!-- Checkout Form Panel -->
    <div class="md:col-span-7">
      <form id="checkout-form" class="card p-6 space-y-5">
        
        <!-- Cart Summary -->
        <div>
          <div class="flex items-center gap-2 mb-3">
            <i class="fas fa-shopping-cart text-green-600"></i>
            <span class="font-medium">your cart</span>
          </div>
          <div id="cart-items" class="space-y-2 min-h-24">
            <div class="empty-cart">
              <i class="fas fa-basket-shopping"></i>
              <p class="text-sm">Select products to add to cart</p>
            </div>
          </div>
        </div>
        
        <!-- Delivery Info -->
        <div class="flex items-center gap-2"><i class="fas fa-map-pin text-green-600"></i><span class="font-medium">delivery</span></div>
        <div class="grid sm:grid-cols-2 gap-4">
          <input type="text" id="name" placeholder="Full name *" class="input-field" autocomplete="name">
          <input type="tel" id="phone" placeholder="Phone *" class="input-field" autocomplete="tel">
          <input type="email" id="email" placeholder="Email *" class="input-field sm:col-span-2" autocomplete="email">
          <textarea id="address" placeholder="Delivery address *" rows="2" class="input-field sm:col-span-2" autocomplete="street-address"></textarea>
        </div>
        
        <!-- Payment Info -->
        <div>
          <div class="flex items-center gap-2 mb-3"><i class="fas fa-mobile-alt text-green-600"></i><span class="font-medium">bKash (on delivery)</span></div>
          <div class="bg-green-50 p-4 rounded-2xl border border-green-100 text-sm mb-3">
            send to <span class="font-mono font-semibold">01794449607</span>
          </div>
          <input type="text" id="transactionId" placeholder="bKash transaction ID *" class="input-field" autocomplete="off">
        </div>
        
        <!-- Order Summary -->
        <div class="bg-white p-5 rounded-2xl border border-green-100">
          <div id="order-items-summary"></div>
          <div class="summary-line"><span class="flex items-center gap-2">delivery <span class="delivery-badge">fixed</span></span> <span class="font-medium text-green-700">৳ 120</span></div>
          <div class="flex justify-between pt-3 border-t border-green-200 mt-2">
            <span class="font-semibold text-lg">total</span>
            <span id="summary-total" class="summary-total">৳ 120</span>
          </div>
          <input type="hidden" id="form-total">
          <input type="hidden" id="form-items">
        </div>
        
        <!-- Submit Button -->
        <button type="submit" id="submit-btn" class="premium-btn">
          <span id="btn-text">place order</span>
          <span id="btn-loading" class="hidden flex items-center justify-center gap-2"><i class="fas fa-spinner fa-spin"></i> processing</span>
        </button>
        
        <!-- Message Box -->
        <div id="form-message" class="hidden"></div>
      </form>
    </div>
  </div>
</div>

<script>
  (function() {
    // Product catalog
    const products = [
      { id: 1, name: "Whole Chicken (3kg)", price: 1260, icon: 'fa-drumstick-bite' },
      { id: 2, name: "Whole Chicken (5kg)", price: 2075, icon: 'fa-utensils' },
      { id: 3, name: "Whole Chicken (10kg)", price: 3650, icon: 'fa-users' }
    ];

    const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbwuTodU2_Rlr4dGOyF4hgVKPs7A4hzd8uurKymE3ZsTiuxpleu03WBB4ijEdFisfEC4/exec';
    const DELIVERY_COST = 120;
    const MIN_QTY = 1;
    const MAX_QTY = 99;

    // Cart state: { productId: { product, quantity } }
    const cart = {};

    // DOM Elements
    const productList = document.getElementById('product-list');
    const cartItemsContainer = document.getElementById('cart-items');
    const orderItemsSummary = document.getElementById('order-items-summary');
    const summaryTotal = document.getElementById('summary-total');
    const formTotal = document.getElementById('form-total');
    const formItems = document.getElementById('form-items');
    const cartCount = document.getElementById('cart-count');
    
    const nameField = document.getElementById('name');
    const phoneField = document.getElementById('phone');
    const emailField = document.getElementById('email');
    const addressField = document.getElementById('address');
    const transactionField = document.getElementById('transactionId');
    const form = document.getElementById('checkout-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnLoading = document.getElementById('btn-loading');
    const messageBox = document.getElementById('form-message');

    // Render product list
    function renderProducts() {
      productList.innerHTML = '';
      products.forEach(p => {
        const inCart = cart[p.id];
        const div = document.createElement('div');
        div.className = `product-item ${inCart ? 'in-cart' : ''}`;
        div.dataset.id = p.id;
        div.innerHTML = `
          <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-green-700 flex-shrink-0">
            <i class="fas ${p.icon}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-medium truncate">${p.name}</div>
            <div class="text-green-700 font-bold">৳ ${p.price.toLocaleString()}</div>
          </div>
          <div class="check-indicator flex-shrink-0">
            ${inCart ? '<i class="fas fa-check text-xs"></i>' : ''}
          </div>
        `;
        div.addEventListener('click', () => toggleProductInCart(p.id));
        productList.appendChild(div);
      });
    }

    // Toggle product in cart
    function toggleProductInCart(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      if (cart[productId]) {
        // Remove from cart
        delete cart[productId];
      } else {
        // Add to cart with quantity 1
        cart[productId] = { product, quantity: 1 };
      }
      
      renderProducts();
      renderCart();
      updateTotals();
    }

    // Update quantity for a cart item
    function updateCartItemQuantity(productId, delta) {
      if (!cart[productId]) return;
      
      const newQty = cart[productId].quantity + delta;
      if (newQty >= MIN_QTY && newQty <= MAX_QTY) {
        cart[productId].quantity = newQty;
        renderCart();
        updateTotals();
      }
    }

    // Remove item from cart
    function removeCartItem(productId) {
      delete cart[productId];
      renderProducts();
      renderCart();
      updateTotals();
    }

    // Render cart items
    function renderCart() {
      const cartIds = Object.keys(cart);
      
      // Update cart count badge
      const totalItems = cartIds.reduce((sum, id) => sum + cart[id].quantity, 0);
      cartCount.innerText = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
      
      // Empty state
      if (cartIds.length === 0) {
        cartItemsContainer.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-basket-shopping"></i>
            <p class="text-sm">Select products to add to cart</p>
          </div>
        `;
        orderItemsSummary.innerHTML = '';
        return;
      }

      // Render cart items list
      cartItemsContainer.innerHTML = cartIds.map(id => {
        const { product, quantity } = cart[id];
        const itemTotal = product.price * quantity;
        return `
          <div class="cart-item">
            <div class="flex items-start justify-between gap-2">
              <div class="flex-1 min-w-0">
                <div class="cart-item-name truncate">${product.name}</div>
                <div class="cart-item-price">৳ ${product.price.toLocaleString()} × ${quantity}</div>
              </div>
              <button type="button" class="remove-btn" data-remove="${id}" title="Remove item">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="cart-item-controls">
              <button type="button" class="qty-btn" data-qty-decrease="${id}" title="Decrease">
                <i class="fas fa-minus"></i>
              </button>
              <span class="qty-display">${quantity}</span>
              <button type="button" class="qty-btn" data-qty-increase="${id}" title="Increase">
                <i class="fas fa-plus"></i>
              </button>
              <span class="ml-auto text-sm font-semibold text-green-700">৳ ${itemTotal.toLocaleString()}</span>
            </div>
          </div>
        `;
      }).join('');

      // Render order summary (compact)
      orderItemsSummary.innerHTML = cartIds.map(id => {
        const { product, quantity } = cart[id];
        return `
          <div class="summary-line text-sm">
            <span>${product.name} × ${quantity}</span>
            <span>৳ ${(product.price * quantity).toLocaleString()}</span>
          </div>
        `;
      }).join('');

      // Attach event listeners to cart controls
      cartItemsContainer.querySelectorAll('[data-qty-decrease]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          updateCartItemQuantity(parseInt(btn.dataset.qtyDecrease), -1);
        });
      });
      cartItemsContainer.querySelectorAll('[data-qty-increase]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          updateCartItemQuantity(parseInt(btn.dataset.qtyIncrease), 1);
        });
      });
      cartItemsContainer.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          removeCartItem(parseInt(btn.dataset.remove));
        });
      });
    }

    // Calculate and update totals
    function updateTotals() {
      const cartIds = Object.keys(cart);
      const subtotal = cartIds.reduce((sum, id) => {
        const { product, quantity } = cart[id];
        return sum + (product.price * quantity);
      }, 0);
      
      const total = subtotal + DELIVERY_COST;
      
      // Update displays
      summaryTotal.innerText = `৳ ${total.toLocaleString()}`;
      formTotal.value = total;
      
      // Prepare items data for form submission
      const itemsData = cartIds.map(id => ({
        productId: id,
        name: cart[id].product.name,
        unitPrice: cart[id].product.price,
        quantity: cart[id].quantity,
        subtotal: cart[id].product.price * cart[id].quantity
      }));
      formItems.value = JSON.stringify(itemsData);
    }

    // Form field validation
    [nameField, phoneField, emailField, addressField, transactionField].forEach(f => {
      f?.addEventListener('input', () => f.classList.remove('error'));
    });

    function markFieldError(field) {
      if (!field) return;
      field.classList.add('error');
      field.focus({ preventScroll: true });
    }

    function setMessage(text, type) {
      if (!messageBox) return;
      messageBox.className = `message ${type} mt-2`;
      messageBox.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'} mr-2"></i>${text}`;
      messageBox.classList.remove('hidden');
      
      if (type === 'success') {
        setTimeout(() => messageBox.classList.add('hidden'), 5000);
      }
    }

    // Form submission
    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      document.querySelectorAll('.input-field').forEach(f => f.classList.remove('error'));
      
      // Validate cart
      if (Object.keys(cart).length === 0) {
        setMessage('Please add at least one product to your cart.', 'error');
        return;
      }
      
      // Get form values
      const name = nameField?.value.trim();
      const phone = phoneField?.value.trim();
      const email = emailField?.value.trim();
      const address = addressField?.value.trim();
      const txn = transactionField?.value.trim().toUpperCase();
      
      // Validate fields
      let hasError = false;
      if (!name) { markFieldError(nameField); hasError = true; }
      if (!phone) { markFieldError(phoneField); hasError = true; }
      if (!email || !email.includes('@')) { markFieldError(emailField); hasError = true; }
      if (!address) { markFieldError(addressField); hasError = true; }
      if (!txn || txn.length < 8) { markFieldError(transactionField); hasError = true; }
      
      if (hasError) {
        setMessage('Please complete all fields correctly.', 'error');
        return;
      }

      // Calculate totals
      const cartIds = Object.keys(cart);
      const subtotal = cartIds.reduce((sum, id) => {
        const { product, quantity } = cart[id];
        return sum + (product.price * quantity);
      }, 0);
      const total = subtotal + DELIVERY_COST;

      // Prepare order data
      const orderData = {
        transactionId: txn,
        name, email, phone, address,
        deliveryCost: DELIVERY_COST,
        subtotal: subtotal,
        total: total,
        items: cartIds.map(id => ({
          productId: id,
          name: cart[id].product.name,
          unitPrice: cart[id].product.price,
          quantity: cart[id].quantity,
          subtotal: cart[id].product.price * cart[id].quantity
        })),
        timestamp: new Date().toISOString()
      };

      // Loading state
      submitBtn.disabled = true;
      btnText?.classList.add('hidden');
      btnLoading?.classList.remove('hidden');
      messageBox?.classList.add('hidden');

      try {
        const response = await fetch(GOOGLE_SHEET_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });
        
        const result = await response.json();
        
        if (response.ok && result.result === 'success') {
          setMessage('✓ Order confirmed! We\'ll contact you shortly.', 'success');
          
          // Reset everything
          form?.reset();
          Object.keys(cart).forEach(id => delete cart[id]);
          renderProducts();
          renderCart();
          updateTotals();
          
        } else {
          setMessage(`❌ ${result.message || 'Order failed. Please try again.'}`, 'error');
        }
      } catch (err) {
        console.warn('Primary fetch failed, trying fallback...', err);
        
        try {
          await fetch(GOOGLE_SHEET_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData) 
          });
          
          setMessage('✓ Order recorded. We\'ll confirm via phone.', 'success');
          
          form?.reset();
          Object.keys(cart).forEach(id => delete cart[id]);
          renderProducts();
          renderCart();
          updateTotals();
          
        } catch (fallbackErr) {
          console.error('Fallback fetch failed:', fallbackErr);
          setMessage('❌ Network error. Please check your connection and try again.', 'error');
        }
      } finally {
        submitBtn.disabled = false;
        btnLoading?.classList.add('hidden');
        btnText?.classList.remove('hidden');
      }
    });

    // Initialize
    renderProducts();
    renderCart();
    updateTotals();
    
  })();
</script>
</body>
</html>
