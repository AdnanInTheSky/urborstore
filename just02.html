<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Urbor • Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f6faf9; 
      color: #1a2e2b;
    }
    .card {
      background: white;
      border-radius: 24px;
      border: 1px solid #e2f0e8;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    }
    .product-item {
      background: white;
      border-radius: 20px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid #e2f0e8;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .product-item:hover {
      border-color: #0f8f6e;
      transform: translateY(-2px);
    }
    .product-item.selected {
      border-color: #0f8f6e;
      background: #ebfaf3;
    }
    .product-item.selected .check-indicator {
      background: #0f8f6e;
      border-color: #0f8f6e;
      color: white;
    }
    .check-indicator {
      width: 24px; height: 24px;
      border-radius: 24px;
      border: 2px solid #cbdcd0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .input-field {
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: white;
      border: 1px solid #d0e2da;
      border-radius: 20px;
      transition: all 0.2s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: #0f8f6e;
      box-shadow: 0 0 0 3px rgba(15,143,110,0.1);
    }
    .input-field.error {
      border-color: #dc4a4a;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .premium-btn {
      background: #0f8f6e;
      color: white;
      font-weight: 600;
      padding: 1rem;
      border-radius: 40px;
      width: 100%;
      box-shadow: 0 8px 16px rgba(15,143,110,0.2);
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .premium-btn:hover { 
      background: #0c7559;
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15,143,110,0.3);
    }
    .premium-btn:active { transform: translateY(0); }
    .premium-btn:disabled { 
      opacity: 0.5; 
      cursor: not-allowed;
      transform: none;
    }
    .message {
      padding: 1rem;
      border-radius: 40px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.success { background: #e0f5e8; color: #0b5e45; }
    .message.error { background: #fee9e7; color: #aa2e2e; }
    .summary-line { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed #cfe3db; }
    .summary-total { font-size: 1.8rem; font-weight: 700; color: #0f8f6e; }
    
    /* Quantity button styles */
    .qty-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: white;
      border: 2px solid #0f8f6e;
      color: #0f8f6e;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 0.75rem;
    }
    .qty-btn:hover:not(:disabled) {
      background: #0f8f6e;
      color: white;
      transform: scale(1.05);
    }
    .qty-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .qty-display {
      min-width: 2rem;
      text-align: center;
      font-weight: 600;
      font-size: 1.1rem;
      color: #1a2e2b;
    }
  </style>
</head>
<body class="antialiased">

<div class="max-w-6xl mx-auto px-4 py-6">
  
  <div class="text-center mb-8">
    <h1 class="text-4xl font-light">complete <span class="font-semibold text-green-700">order</span></h1>
  </div>

  <div class="grid md:grid-cols-12 gap-6">
    
    <div class="md:col-span-5 space-y-5">
      <div class="card p-5">
        <div class="flex items-center gap-2 mb-4">
          <i class="fas fa-tag text-green-600"></i>
          <span class="font-semibold">select product</span>
        </div>
        <div class="space-y-2" id="product-list"></div>
        
        <div id="selected-summary" class="mt-5 pt-3 border-t border-green-100 hidden">
          <div class="flex items-center justify-between text-sm mb-3">
            <span class="text-gray-500">selected:</span>
            <span id="selected-name" class="font-semibold"></span>
            <span id="selected-price" class="font-bold text-green-700"></span>
          </div>
          
          <!-- Quantity Controls -->
          <div class="flex items-center justify-between bg-green-50 p-3 rounded-xl mb-3">
            <span class="text-sm text-gray-600 font-medium">quantity</span>
            <div class="flex items-center gap-2">
              <button type="button" id="qty-decrease" class="qty-btn" title="Decrease quantity">
                <i class="fas fa-minus"></i>
              </button>
              <span id="qty-display" class="qty-display">1</span>
              <button type="button" id="qty-increase" class="qty-btn" title="Increase quantity">
                <i class="fas fa-plus"></i>
              </button>
            </div>
          </div>
          
          <div class="flex justify-between pt-2 border-t border-green-100">
            <span class="font-semibold text-gray-700">subtotal</span>
            <span id="subtotal-price" class="font-bold text-green-700 text-lg"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="md:col-span-7">
      <form id="checkout-form" class="card p-6 space-y-5">
        
        <div class="flex items-center gap-2"><i class="fas fa-map-pin text-green-600"></i><span class="font-medium">delivery</span></div>
        <div class="grid sm:grid-cols-2 gap-4">
          <input type="text" id="name" placeholder="Full name *" class="input-field" autocomplete="name">
          <input type="tel" id="phone" placeholder="Phone *" class="input-field" autocomplete="tel">
          <input type="email" id="email" placeholder="Email *" class="input-field sm:col-span-2" autocomplete="email">
          <textarea id="address" placeholder="Delivery address *" rows="2" class="input-field sm:col-span-2" autocomplete="street-address"></textarea>
        </div>
        
        <div>
          <div class="flex items-center gap-2 mb-3"><i class="fas fa-mobile-alt text-green-600"></i><span class="font-medium">bKash (on delivery)</span></div>
          <div class="bg-green-50 p-4 rounded-2xl border border-green-100 text-sm mb-3">
            send to <span class="font-mono font-semibold">01794449607</span>
          </div>
          <input type="text" id="transactionId" placeholder="bKash transaction ID *" class="input-field" autocomplete="off">
        </div>
        
        <div class="bg-white p-5 rounded-2xl border border-green-100">
          <div class="summary-line"><span>product</span> <span id="summary-product" class="font-medium">—</span></div>
          <div class="summary-line"><span>quantity</span> <span id="summary-qty" class="font-medium">1</span></div>
          <div class="summary-line"><span>delivery</span> <span class="text-green-700">free</span></div>
          <div class="flex justify-between pt-3 border-t border-green-100">
            <span class="font-semibold text-lg">total</span>
            <span id="summary-total" class="summary-total">৳ 0</span>
          </div>
          <input type="hidden" id="form-total">
          <input type="hidden" id="form-items">
        </div>
        
        <button type="submit" id="submit-btn" class="premium-btn">
          <span id="btn-text">place order</span>
          <span id="btn-loading" class="hidden flex items-center justify-center gap-2"><i class="fas fa-spinner fa-spin"></i> processing</span>
        </button>
        
        <div id="form-message" class="hidden"></div>
      </form>
    </div>
  </div>
</div>

<script>
  (function() {
    const products = [
      { id: 1, name: "Whole Chicken (3kg)", price: 1260, icon: 'fa-drumstick-bite' },
      { id: 2, name: "Whole Chicken (5kg)", price: 2075, icon: 'fa-utensils' },
      { id: 3, name: "Whole Chicken (10kg)", price: 3650, icon: 'fa-users' }
    ];

    const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbwuTodU2_Rlr4dGOyF4hgVKPs7A4hzd8uurKymE3ZsTiuxpleu03WBB4ijEdFisfEC4/exec';

    // DOM Elements
    const productList = document.getElementById('product-list');
    const selectedSummary = document.getElementById('selected-summary');
    const selectedNameSpan = document.getElementById('selected-name');
    const selectedPriceSpan = document.getElementById('selected-price');
    const summaryProduct = document.getElementById('summary-product');
    const summaryQty = document.getElementById('summary-qty');
    const summaryTotal = document.getElementById('summary-total');
    const subtotalPrice = document.getElementById('subtotal-price');
    const formTotal = document.getElementById('form-total');
    const formItems = document.getElementById('form-items');
    
    const nameField = document.getElementById('name');
    const phoneField = document.getElementById('phone');
    const emailField = document.getElementById('email');
    const addressField = document.getElementById('address');
    const transactionField = document.getElementById('transactionId');
    const form = document.getElementById('checkout-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnLoading = document.getElementById('btn-loading');
    const messageBox = document.getElementById('form-message');
    
    // Quantity state
    let selectedProduct = null;
    let quantity = 1;
    const MIN_QTY = 1;
    const MAX_QTY = 99;

    // Render product list
    products.forEach(p => {
      const div = document.createElement('div');
      div.className = 'product-item';
      div.dataset.id = p.id;
      div.innerHTML = `
        <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-green-700 flex-shrink-0">
          <i class="fas ${p.icon}"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-medium truncate">${p.name}</div>
          <div class="text-green-700 font-bold">৳ ${p.price.toLocaleString()}</div>
        </div>
        <div class="check-indicator flex-shrink-0"></div>
      `;
      div.addEventListener('click', () => selectProduct(p, div));
      productList.appendChild(div);
    });

    // Quantity helper functions
    function updateQuantityDisplay() {
      const qtyDisplay = document.getElementById('qty-display');
      const decreaseBtn = document.getElementById('qty-decrease');
      const increaseBtn = document.getElementById('qty-increase');
      
      if (qtyDisplay) qtyDisplay.innerText = quantity;
      if (decreaseBtn) decreaseBtn.disabled = quantity <= MIN_QTY;
      if (increaseBtn) increaseBtn.disabled = quantity >= MAX_QTY;
    }

    function updatePricing() {
      if (!selectedProduct) return;
      
      const subtotal = selectedProduct.price * quantity;
      
      // Update all price displays
      if (selectedPriceSpan) selectedPriceSpan.innerText = `৳ ${selectedProduct.price.toLocaleString()}`;
      if (subtotalPrice) subtotalPrice.innerText = `৳ ${subtotal.toLocaleString()}`;
      if (summaryTotal) summaryTotal.innerText = `৳ ${subtotal.toLocaleString()}`;
      if (summaryQty) summaryQty.innerText = quantity;
      
      // Update hidden form fields
      if (formTotal) formTotal.value = subtotal;
      if (formItems) {
        formItems.value = JSON.stringify({ 
          product: selectedProduct.name, 
          price: selectedProduct.price, 
          quantity: quantity 
        });
      }
    }

    function changeQuantity(delta) {
      const newQty = quantity + delta;
      if (newQty >= MIN_QTY && newQty <= MAX_QTY) {
        quantity = newQty;
        updateQuantityDisplay();
        updatePricing();
      }
    }

    // Product selection
    function selectProduct(product, cardEl) {
      // Deselect all other products
      document.querySelectorAll('.product-item').forEach(c => {
        c.classList.remove('selected');
        const ind = c.querySelector('.check-indicator');
        if (ind) ind.innerHTML = '';
      });
      
      // Select current product
      cardEl.classList.add('selected');
      const indicator = cardEl.querySelector('.check-indicator');
      if (indicator) indicator.innerHTML = '<i class="fas fa-check text-xs"></i>';
      
      // Update state
      selectedProduct = product;
      quantity = 1; // Reset quantity when product changes
      
      // Update UI
      if (selectedNameSpan) selectedNameSpan.innerText = product.name;
      if (summaryProduct) summaryProduct.innerText = product.name;
      
      updateQuantityDisplay();
      updatePricing();
      
      if (selectedSummary) selectedSummary.classList.remove('hidden');
    }

    // Auto-select first product after render
    setTimeout(() => {
      if (!selectedProduct && products.length > 0) {
        const firstCard = document.querySelector('.product-item');
        if (firstCard) selectProduct(products[0], firstCard);
      }
    }, 300);

    // Quantity button event listeners
    document.getElementById('qty-decrease')?.addEventListener('click', (e) => {
      e.preventDefault();
      changeQuantity(-1);
    });
    
    document.getElementById('qty-increase')?.addEventListener('click', (e) => {
      e.preventDefault();
      changeQuantity(1);
    });

    // Real-time validation feedback
    [nameField, phoneField, emailField, addressField, transactionField].forEach(f => {
      f?.addEventListener('input', () => f.classList.remove('error'));
    });

    function markFieldError(field) {
      if (!field) return;
      field.classList.add('error');
      field.focus({ preventScroll: true });
    }

    function setMessage(text, type) {
      if (!messageBox) return;
      messageBox.className = `message ${type} mt-2`;
      messageBox.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'} mr-2"></i>${text}`;
      messageBox.classList.remove('hidden');
      
      // Auto-hide success messages after 5 seconds
      if (type === 'success') {
        setTimeout(() => {
          messageBox.classList.add('hidden');
        }, 5000);
      }
    }

    // Form submission
    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear previous errors
      document.querySelectorAll('.input-field').forEach(f => f.classList.remove('error'));
      
      // Validate product selection
      if (!selectedProduct) {
        setMessage('Please select a product.', 'error');
        return;
      }
      
      // Get and trim form values
      const name = nameField?.value.trim();
      const phone = phoneField?.value.trim();
      const email = emailField?.value.trim();
      const address = addressField?.value.trim();
      const txn = transactionField?.value.trim().toUpperCase();
      
      // Validate fields
      let hasError = false;
      if (!name) { markFieldError(nameField); hasError = true; }
      if (!phone) { markFieldError(phoneField); hasError = true; }
      if (!email || !email.includes('@')) { markFieldError(emailField); hasError = true; }
      if (!address) { markFieldError(addressField); hasError = true; }
      if (!txn || txn.length < 8) { markFieldError(transactionField); hasError = true; }
      
      if (hasError) {
        setMessage('Please complete all fields correctly.', 'error');
        return;
      }

      // Prepare order data
      const orderData = {
        transactionId: txn,
        name, 
        email, 
        phone, 
        address,
        product: selectedProduct.name,
        unitPrice: selectedProduct.price,
        quantity: quantity,
        total: selectedProduct.price * quantity,
        items: JSON.stringify({ 
          product: selectedProduct.name, 
          price: selectedProduct.price, 
          quantity: quantity 
        }),
        timestamp: new Date().toISOString()
      };

      // Update UI for loading state
      submitBtn.disabled = true;
      btnText?.classList.add('hidden');
      btnLoading?.classList.remove('hidden');
      messageBox?.classList.add('hidden');

      try {
        const response = await fetch(GOOGLE_SHEET_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });
        
        const result = await response.json();
        
        if (response.ok && result.result === 'success') {
          setMessage('✓ Order confirmed! We\'ll contact you shortly.', 'success');
          
          // Reset form
          form?.reset();
          document.querySelectorAll('.product-item').forEach(c => c.classList.remove('selected'));
          document.querySelectorAll('.check-indicator').forEach(i => {
            if (i) i.innerHTML = '';
          });
          
          if (selectedSummary) selectedSummary.classList.add('hidden');
          if (summaryProduct) summaryProduct.innerText = '—';
          if (summaryTotal) summaryTotal.innerText = '৳ 0';
          if (summaryQty) summaryQty.innerText = '1';
          
          // Reset state
          selectedProduct = null;
          quantity = 1;
          updateQuantityDisplay();
          
        } else {
          setMessage(`❌ ${result.message || 'Order failed. Please try again.'}`, 'error');
        }
      } catch (err) {
        console.warn('Primary fetch failed, trying fallback...', err);
        
        // Fallback: no-cors request (limited response handling)
        try {
          await fetch(GOOGLE_SHEET_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData) 
          });
          
          setMessage('✓ Order recorded. We\'ll confirm via phone.', 'success');
          
          // Reset form
          form?.reset();
          document.querySelectorAll('.product-item').forEach(c => c.classList.remove('selected'));
          if (selectedSummary) selectedSummary.classList.add('hidden');
          if (summaryProduct) summaryProduct.innerText = '—'; 
          if (summaryTotal) summaryTotal.innerText = '৳ 0';
          
          selectedProduct = null;
          quantity = 1;
          updateQuantityDisplay();
          
        } catch (fallbackErr) {
          console.error('Fallback fetch failed:', fallbackErr);
          setMessage('❌ Network error. Please check your connection and try again.', 'error');
        }
      } finally {
        // Restore button state
        submitBtn.disabled = false;
        btnLoading?.classList.add('hidden');
        btnText?.classList.remove('hidden');
      }
    });

    // Initialize quantity display on load
    updateQuantityDisplay();
    
  })();
</script>
</body>
</html>
